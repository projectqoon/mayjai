<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บิลจัดซื้อวัตถุดิบ</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d6a4f;
    --green-light: #40916c;
    --green-pale: #d8f3dc;
    --green-mid: #b7e4c7;
    --cream: #fefae0;
    --warm: #f8f4e8;
    --dark: #1b1b1b;
    --gray: #6b6b6b;
    --border: #d4c89a;
    --red: #c1121f;
    --shadow: 0 2px 12px rgba(45,106,79,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--warm); color: var(--dark); min-height: 100vh; }

.topbar {
background: var(--green); color: white; padding: 14px 16px 10px;
display: flex; align-items: center; justify-content: space-between;
position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.topbar-title { font-family: 'Prompt', sans-serif; font-size: 1.05rem; font-weight: 700; }
.topbar-sub { font-size: 0.72rem; opacity: 0.78; margin-top: 1px; }
.tab-btns { display: flex; gap: 4px; }
.tab-btn {
background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
color: white; border-radius: 20px; padding: 5px 13px; font-size: 0.8rem;
font-family: 'Sarabun', sans-serif; cursor: pointer; transition: all 0.2s;
}
.tab-btn.active { background: white; color: var(--green); font-weight: 600; }

.view { display: none; padding: 14px; }
.view.active { display: block; }

.card {
background: white; border-radius: 14px; padding: 16px;
box-shadow: var(--shadow); margin-bottom: 14px;
border: 1px solid rgba(212,200,154,0.4);
}
.card-title {
font-family: 'Prompt', sans-serif; font-size: 0.95rem; font-weight: 600;
color: var(--green); margin-bottom: 12px; display: flex; align-items: center; gap: 7px;
}

label { font-size: 0.83rem; color: var(--gray); display: block; margin-bottom: 4px; font-weight: 500; }
input, select, textarea {
width: 100%; border: 1.5px solid var(--border); border-radius: 9px;
padding: 9px 12px; font-size: 0.92rem; font-family: 'Sarabun', sans-serif;
background: var(--cream); color: var(--dark); outline: none; transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--green-light); background: white; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { margin-bottom: 11px; }

.items-wrap { overflow-x: auto; }
.items-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
.items-table th {
background: var(--green-pale); color: var(--green); font-weight: 600;
padding: 8px 8px; text-align: left; white-space: nowrap;
}
.items-table td { padding: 7px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
.items-table tr:last-child td { border-bottom: none; }
.del-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1.1rem; padding: 0 2px; }

.add-btn {
width: 100%; background: var(--green-pale); border: 1.5px dashed var(--green-light);
color: var(--green); border-radius: 9px; padding: 9px; font-size: 0.9rem;
font-family: 'Sarabun', sans-serif; cursor: pointer; margin-top: 10px; font-weight: 600;
}
.add-btn:hover { background: var(--green-mid); }

.total-bar {
background: var(--green); color: white; border-radius: 12px;
padding: 14px 18px; display: flex; justify-content: space-between; align-items: center;
margin-bottom: 14px;
}
.total-bar .label { font-size: 0.88rem; opacity: 0.85; }
.total-bar .amount { font-family: 'Prompt', sans-serif; font-size: 1.5rem; font-weight: 700; }

canvas {
border: 1.5px solid var(--border); border-radius: 9px;
background: white; touch-action: none; display: block; margin: 0 auto; cursor: crosshair;
width: 100%; height: 120px;
}
.sig-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; }
.sig-btn {
border: 1.5px solid var(--border); background: white; border-radius: 8px;
padding: 6px 14px; font-size: 0.82rem; font-family: 'Sarabun', sans-serif; cursor: pointer; color: var(--gray);
}
.sig-btn:hover { background: var(--green-pale); color: var(--green); border-color: var(--green-light); }

.actions { display: flex; gap: 10px; margin-bottom: 20px; }
.btn-main {
flex: 1; background: var(--green); color: white; border: none;
border-radius: 11px; padding: 13px; font-size: 0.95rem; font-weight: 600;
font-family: 'Sarabun', sans-serif; cursor: pointer;
}
.btn-main:hover { background: var(--green-light); }
.btn-outline {
flex: 1; background: white; color: var(--green); border: 1.5px solid var(--green);
border-radius: 11px; padding: 13px; font-size: 0.95rem; font-weight: 600;
font-family: 'Sarabun', sans-serif; cursor: pointer;
}
.btn-outline:hover { background: var(--green-pale); }

.bill-card {
background: white; border-radius: 14px; padding: 14px 16px;
box-shadow: var(--shadow); margin-bottom: 12px;
border: 1px solid rgba(212,200,154,0.4);
}
.bill-no { font-family: 'Prompt', sans-serif; font-size: 0.85rem; color: var(--green); font-weight: 600; }
.bill-date { font-size: 0.78rem; color: var(--gray); margin-top: 2px; }
.bill-vendor { font-size: 0.92rem; font-weight: 600; margin: 4px 0 2px; }
.bill-amount { font-family: 'Prompt', sans-serif; font-size: 1.15rem; font-weight: 700; color: var(--green); }
.bill-actions { display: flex; gap: 6px; margin-top: 10px; }
.bill-btn {
flex: 1; border-radius: 8px; padding: 7px; font-size: 0.82rem;
font-family: 'Sarabun', sans-serif; cursor: pointer; border: 1.5px solid; font-weight: 500;
}
.view-btn { background: var(--green-pale); color: var(--green); border-color: var(--green-mid); }
.del-bill-btn { background: #fff0f0; color: var(--red); border-color: #ffb3b3; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
.empty-state .icon { font-size: 3rem; margin-bottom: 10px; }

.summary-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
.summary-row:last-child { border-bottom: none; }
.summary-total { background: var(--green-pale); border-radius: 10px; padding: 12px 14px; margin-top: 10px; display: flex; justify-content: space-between; }

.modal-overlay {
display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
z-index: 200; justify-content: center; align-items: flex-end;
}
.modal-overlay.open { display: flex; }
.modal {
background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
max-height: 90vh; overflow-y: auto; padding: 20px 18px 30px;
animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-family: 'Prompt', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 14px; text-align: center; color: var(--green); }
.modal-close { float: right; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--gray); }

.bill-preview { border: 1.5px solid var(--border); border-radius: 10px; padding: 16px; background: var(--cream); font-size: 0.88rem; }
.preview-header { text-align: center; border-bottom: 1.5px dashed var(--border); padding-bottom: 12px; margin-bottom: 12px; }
.preview-company { font-family: 'Prompt', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--green); }
.preview-title { font-size: 0.95rem; font-weight: 600; margin: 4px 0 2px; }
.preview-meta { font-size: 0.8rem; color: var(--gray); }
.preview-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
.preview-table th { background: var(--green-pale); padding: 6px 8px; font-size: 0.8rem; color: var(--green); }
.preview-table td { padding: 6px 8px; border-bottom: 1px solid #eee; font-size: 0.82rem; }
.preview-sign { display: flex; justify-content: space-between; margin-top: 16px; padding-top: 12px; border-top: 1.5px dashed var(--border); }
.sign-box { text-align: center; width: 45%; }
.sig-line { border-top: 1.5px solid #999; margin-bottom: 4px; }
.sig-name { font-size: 0.78rem; color: var(--gray); }
.sign-img { max-height: 50px; max-width: 100%; }

@media print {
body > *:not(.modal-overlay) { display: none !important; }
.modal-overlay { display: flex !important; position: static; background: none; }
.modal { box-shadow: none; border-radius: 0; max-height: none; }
.modal-close, .modal .actions { display: none !important; }
}
</style>

</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">🛒 บิลจัดซื้อวัตถุดิบ</div>
    <div class="topbar-sub">ระบบจัดการบิลค่าใช้จ่ายครัว</div>
  </div>
  <div class="tab-btns">
    <button class="tab-btn active" onclick="switchTab('create',this)">สร้างบิล</button>
    <button class="tab-btn" onclick="switchTab('history',this)">ประวัติ</button>
    <button class="tab-btn" onclick="switchTab('summary',this)">สรุป</button>
  </div>
</div>

<!-- CREATE -->

<div id="tab-create" class="view active">
  <div class="card">
    <div class="card-title">📋 ข้อมูลบิล</div>
    <div class="row2">
      <div class="form-group">
        <label>บริษัท / ผู้จัดทำ</label>
        <input type="text" id="company" placeholder="ชื่อบริษัท...">
      </div>
      <div class="form-group">
        <label>วันที่ <span style="font-size:0.75rem;color:var(--red);font-weight:400">🔒 เฉพาะวันนี้เท่านั้น</span></label>
        <input type="date" id="billDate" readonly style="background:#f0f0f0;color:var(--gray);cursor:not-allowed">
      </div>
    </div>
    <div class="row2">
      <div class="form-group">
        <label>ชื่อผู้ขาย / ร้านค้า</label>
        <input type="text" id="vendorName" placeholder="ชื่อแม่ค้า...">
      </div>
      <div class="form-group">
        <label>เลขที่บิล</label>
        <input type="text" id="billNo" placeholder="BL-001">
      </div>
    </div>
    <div class="form-group">
      <label>หมวดหมู่วัตถุดิบ</label>
      <select id="category">
        <option>🥦 ผักและผลไม้</option>
        <option>🥩 เนื้อสัตว์</option>
        <option>🐟 อาหารทะเล</option>
        <option>🧂 เครื่องปรุง</option>
        <option>🌾 ของแห้ง</option>
        <option>🥚 นมและไข่</option>
        <option>📦 อื่นๆ</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🛒 รายการสินค้า</div>
    <div class="items-wrap">
      <table class="items-table">
        <thead><tr><th>#</th><th>รายการ</th><th>จำนวน</th><th>หน่วย</th><th>ราคา/หน่วย</th><th>รวม</th><th></th></tr></thead>
        <tbody id="itemsBody"></tbody>
      </table>
    </div>
    <button class="add-btn" onclick="addRow()">＋ เพิ่มรายการ</button>
  </div>

  <div class="total-bar">
    <div>
      <div class="label">ยอดรวมทั้งสิ้น</div>
      <div style="font-size:0.75rem;opacity:0.7" id="itemCount">0 รายการ</div>
    </div>
    <div class="amount" id="totalDisplay">฿0</div>
  </div>

  <div class="card">
    <div class="card-title">✍️ ลายเซ็นผู้ขาย</div>
    <p style="font-size:0.82rem;color:var(--gray);margin-bottom:10px">ให้แม่ค้าเซ็นชื่อในช่องนี้</p>
    <canvas id="sigCanvas"></canvas>
    <div class="sig-actions">
      <button class="sig-btn" onclick="clearSig()">🗑 ล้างลายเซ็น</button>
    </div>
    <div class="form-group" style="margin-top:10px">
      <label>ชื่อผู้ขาย (พิมพ์เพิ่ม)</label>
      <input type="text" id="signerName" placeholder="ชื่อแม่ค้า...">
    </div>
    <div class="form-group">
      <label>ผู้จัดซื้อ (แม่ครัว)</label>
      <input type="text" id="buyerName" placeholder="ชื่อแม่ครัว...">
    </div>
  </div>

  <div class="actions">
    <button class="btn-outline" onclick="previewBill()">👁 ดูตัวอย่าง</button>
    <button class="btn-main" onclick="saveBill()">💾 บันทึกบิล</button>
  </div>
</div>

<!-- HISTORY -->

<div id="tab-history" class="view">
  <div id="historyList"></div>
</div>

<!-- SUMMARY -->

<div id="tab-summary" class="view">
  <div class="card">
    <div class="card-title">📊 สรุปรายเดือน</div>
    <div id="summaryContent"></div>
  </div>
  <div class="card">
    <div class="card-title">🗂 สรุปตามหมวดหมู่</div>
    <div id="categoryContent"></div>
  </div>
  <button class="btn-outline" style="width:100%;margin-bottom:20px" onclick="exportCSV()">⬇️ ส่งออก CSV (เปิดใน Excel)</button>
</div>

<!-- MODAL -->

<div class="modal-overlay" id="previewModal" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">ตัวอย่างบิล</div>
    <div id="modalContent"></div>
    <div class="actions" style="margin-top:14px">
      <button class="btn-outline" onclick="closeModal()">ปิด</button>
      <button class="btn-main" onclick="window.print()">🖨 พิมพ์บิล</button>
    </div>
  </div>
</div>

<script>
let bills = JSON.parse(localStorage.getItem('kitchen_bills') || '[]');
let itemRows = [];
let rowCount = 0;
let sigData = null;

// Canvas
const canvas = document.getElementById('sigCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 400; canvas.height = 120;
let drawing = false, lastX = 0, lastY = 0;

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const sx = canvas.width / r.width, sy = canvas.height / r.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left)*sx, y: (src.clientY - r.top)*sy };
}
canvas.addEventListener('mousedown', e => { drawing=true; const p=getPos(e); lastX=p.x; lastY=p.y; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; const p=getPos(e); lastX=p.x; lastY=p.y; }, {passive:false});
canvas.addEventListener('mousemove', e => { if(!drawing) return; stroke(e); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!drawing) return; stroke(e); }, {passive:false});
['mouseup','mouseleave'].forEach(ev => canvas.addEventListener(ev, () => { drawing=false; sigData=canvas.toDataURL(); }));
canvas.addEventListener('touchend', () => { drawing=false; sigData=canvas.toDataURL(); });

function stroke(e) {
  const p = getPos(e);
  ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y);
  ctx.strokeStyle='#1b1b1b'; ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.stroke();
  lastX=p.x; lastY=p.y;
}
function clearSig() { ctx.clearRect(0,0,canvas.width,canvas.height); sigData=null; }

// Init
window.onload = () => {
  const today = new Date().toISOString().split('T')[0];
  const dateEl = document.getElementById('billDate');
  dateEl.value = today;
  dateEl.min = today;
  dateEl.max = today;
  document.getElementById('billNo').value = 'BL-' + String(bills.length+1).padStart(3,'0');
  const co = localStorage.getItem('kitchen_company');
  if(co) document.getElementById('company').value = co;
  const buyer = localStorage.getItem('kitchen_buyer');
  if(buyer) document.getElementById('buyerName').value = buyer;
  addRow(); addRow(); addRow();
  renderHistory(); renderSummary();
};

// Items
function addRow() {
  rowCount++;
  const id = rowCount;
  itemRows.push(id);
  const units = ['กก.','กรัม','ชิ้น','ลูก','หัว','มัด','แพ็ค','ขวด','กล่อง','ลิตร','แผ่น','โหล'];
  const opts = units.map(u=>`<option>${u}</option>`).join('');
  const tr = document.createElement('tr');
  tr.id = 'row-'+id;
  tr.innerHTML = `
    <td style="color:var(--gray);font-size:0.8rem">${id}</td>
    <td><input type="text" placeholder="รายการ..." id="name-${id}" oninput="calcTotal()" style="min-width:90px;padding:6px 7px;font-size:0.83rem"></td>
    <td><input type="number" placeholder="0" id="qty-${id}" oninput="calcRow(${id})" style="width:55px;padding:6px 7px;font-size:0.83rem" min="0" step="any"></td>
    <td><select id="unit-${id}" style="padding:5px 5px;font-size:0.8rem;min-width:55px">${opts}</select></td>
    <td><input type="number" placeholder="0" id="price-${id}" oninput="calcRow(${id})" style="width:68px;padding:6px 7px;font-size:0.83rem" min="0" step="any"></td>
    <td id="sub-${id}" style="font-weight:600;color:var(--green);white-space:nowrap;font-size:0.83rem">-</td>
    <td><button class="del-btn" onclick="delRow(${id})">✕</button></td>`;
  document.getElementById('itemsBody').appendChild(tr);
}

function delRow(id) {
  const el = document.getElementById('row-'+id); if(el) el.remove();
  itemRows = itemRows.filter(i=>i!==id); calcTotal();
}

function calcRow(id) {
  const qty = parseFloat(document.getElementById('qty-'+id)?.value)||0;
  const price = parseFloat(document.getElementById('price-'+id)?.value)||0;
  const sub = qty*price;
  const el = document.getElementById('sub-'+id);
  if(el) el.textContent = sub>0 ? '฿'+fmt(sub) : '-';
  calcTotal();
}

function calcTotal() {
  let total=0, count=0;
  itemRows.forEach(id => {
    const qty = parseFloat(document.getElementById('qty-'+id)?.value)||0;
    const price = parseFloat(document.getElementById('price-'+id)?.value)||0;
    const name = document.getElementById('name-'+id)?.value||'';
    if(name) { total += qty*price; count++; }
  });
  document.getElementById('totalDisplay').textContent = '฿'+fmt(total);
  document.getElementById('itemCount').textContent = count+' รายการ';
}

function getItems() {
  return itemRows.map(id => {
    const name = document.getElementById('name-'+id)?.value?.trim();
    const qty = parseFloat(document.getElementById('qty-'+id)?.value)||0;
    const unit = document.getElementById('unit-'+id)?.value;
    const price = parseFloat(document.getElementById('price-'+id)?.value)||0;
    if(name && qty && price) return {name,qty,unit,price,sub:qty*price};
    return null;
  }).filter(Boolean);
}

function saveBill() {
  const company = document.getElementById('company').value.trim();
  const vendor = document.getElementById('vendorName').value.trim();
  const billDate = document.getElementById('billDate').value;
  const billNo = document.getElementById('billNo').value.trim();
  const category = document.getElementById('category').value;
  const signerName = document.getElementById('signerName').value.trim();
  const buyerName = document.getElementById('buyerName').value.trim();
  const items = getItems();
  if(!vendor) { alert('กรุณาใส่ชื่อผู้ขาย'); return; }
  if(items.length===0) { alert('กรุณาเพิ่มรายการอย่างน้อย 1 รายการ'); return; }
  const today = new Date().toISOString().split('T')[0];
  if(billDate !== today) { alert('❌ ไม่สามารถบันทึกบิลย้อนหลังได้\nกรุณาใช้วันที่ปัจจุบันเท่านั้น'); return; }
  const total = items.reduce((s,i)=>s+i.sub,0);
  const bill = { id:Date.now(), company, vendor, billDate, billNo, category, items, total, signerName, buyerName, sig:sigData };
  bills.unshift(bill);
  localStorage.setItem('kitchen_bills', JSON.stringify(bills));
  if(company) localStorage.setItem('kitchen_company', company);
  if(buyerName) localStorage.setItem('kitchen_buyer', buyerName);
  alert('✅ บันทึกบิลเรียบร้อยแล้ว!');
  document.getElementById('vendorName').value='';
  document.getElementById('signerName').value='';
  document.getElementById('billNo').value='BL-'+String(bills.length+1).padStart(3,'0');
  clearSig();
  document.getElementById('itemsBody').innerHTML='';
  itemRows=[]; rowCount=0;
  addRow(); addRow(); addRow(); calcTotal();
  renderHistory(); renderSummary();
}

function renderHistory() {
  const c = document.getElementById('historyList');
  if(!bills.length) { c.innerHTML='<div class="empty-state"><div class="icon">🧾</div><p>ยังไม่มีบิลที่บันทึกไว้</p></div>'; return; }
  c.innerHTML = bills.map(b=>`
    <div class="bill-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="bill-no">${b.billNo||'ไม่มีเลขบิล'} · <span style="color:var(--gray);font-size:0.75rem">${b.category}</span></div>
          <div class="bill-date">📅 ${fmtDate(b.billDate)}</div>
          <div class="bill-vendor">🏪 ${b.vendor}</div>
          <div style="font-size:0.78rem;color:var(--gray)">${b.items.length} รายการ</div>
        </div>
        <div class="bill-amount">฿${fmt(b.total)}</div>
      </div>
      <div class="bill-actions">
        <button class="bill-btn view-btn" onclick="viewBill(${b.id})">👁 ดูบิล / พิมพ์</button>
        <button class="bill-btn del-bill-btn" onclick="deleteBill(${b.id})">🗑 ลบ</button>
      </div>
    </div>`).join('');
}

function deleteBill(id) {
  if(!confirm('ต้องการลบบิลนี้หรือไม่?')) return;
  bills = bills.filter(b=>b.id!==id);
  localStorage.setItem('kitchen_bills', JSON.stringify(bills));
  renderHistory(); renderSummary();
}

function viewBill(id) {
  const b = bills.find(x=>x.id===id); if(!b) return;
  document.getElementById('modalContent').innerHTML = buildPreview(b);
  document.getElementById('previewModal').classList.add('open');
}

function previewBill() {
  const b = {
    company: document.getElementById('company').value||'',
    vendor: document.getElementById('vendorName').value||'-',
    billDate: document.getElementById('billDate').value,
    billNo: document.getElementById('billNo').value||'-',
    category: document.getElementById('category').value,
    signerName: document.getElementById('signerName').value,
    buyerName: document.getElementById('buyerName').value,
    items: getItems(), sig: sigData
  };
  b.total = b.items.reduce((s,i)=>s+i.sub,0);
  document.getElementById('modalContent').innerHTML = buildPreview(b);
  document.getElementById('previewModal').classList.add('open');
}

function buildPreview(b) {
  const rows = b.items.map((item,i)=>`
    <tr>
      <td>${i+1}</td><td>${item.name}</td>
      <td style="text-align:right">${item.qty} ${item.unit}</td>
      <td style="text-align:right">฿${fmt(item.price)}</td>
      <td style="text-align:right">฿${fmt(item.sub)}</td>
    </tr>`).join('');
  const sigImg = b.sig ? `<img src="${b.sig}" class="sign-img">` : '<div style="height:44px"></div>';
  return `<div class="bill-preview">
    <div class="preview-header">
      <div class="preview-company">${b.company||''}</div>
      <div class="preview-title">ใบเสร็จรับเงิน / บิลเงินสด</div>
      <div class="preview-meta">เลขที่: ${b.billNo||'-'} &nbsp;|&nbsp; วันที่: ${fmtDate(b.billDate)}</div>
      <div class="preview-meta">หมวดหมู่: ${b.category}</div>
      <div class="preview-meta" style="margin-top:4px">ผู้ขาย: <strong>${b.vendor}</strong></div>
    </div>
    <table class="preview-table">
      <thead><tr><th>#</th><th>รายการ</th><th>จำนวน</th><th>ราคา/หน่วย</th><th>รวม</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr>
          <td colspan="4" style="text-align:right;padding-top:10px;font-weight:700;color:var(--green)">ยอดรวมทั้งสิ้น</td>
          <td style="text-align:right;padding-top:10px;font-weight:700;color:var(--green);font-size:1rem">฿${fmt(b.total)}</td>
        </tr>
      </tfoot>
    </table>
    <div class="preview-sign">
      <div class="sign-box">
        <div style="margin-bottom:4px">${sigImg}</div>
        <div class="sig-line"></div>
        <div class="sig-name">ลายเซ็นผู้ขาย<br>${b.signerName?'('+b.signerName+')':''}</div>
      </div>
      <div class="sign-box">
        <div style="height:50px"></div>
        <div class="sig-line"></div>
        <div class="sig-name">ลายเซ็นผู้จัดซื้อ<br>${b.buyerName?'('+b.buyerName+')':''}</div>
      </div>
    </div>
    <div style="text-align:center;font-size:0.72rem;color:var(--gray);margin-top:10px;border-top:1px solid #ddd;padding-top:8px">
      บิลนี้ออกโดยระบบจัดซื้อวัตถุดิบ
    </div>
  </div>`;
}

function renderSummary() {
  if(!bills.length) {
    document.getElementById('summaryContent').innerHTML='<div style="color:var(--gray);font-size:0.88rem;text-align:center;padding:20px">ยังไม่มีข้อมูล</div>';
    document.getElementById('categoryContent').innerHTML=''; return;
  }
  const byMonth = {};
  bills.forEach(b => { const m=b.billDate?b.billDate.substring(0,7):'?'; byMonth[m]=(byMonth[m]||0)+b.total; });
  const mEntries = Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0]));
  const grand = mEntries.reduce((s,[,v])=>s+v,0);
  document.getElementById('summaryContent').innerHTML =
    mEntries.map(([m,v])=>`<div class="summary-row"><span>${fmtMonth(m)}</span><span style="font-weight:600">฿${fmt(v)}</span></div>`).join('') +
    `<div class="summary-total"><span style="font-weight:600;color:var(--green)">รวมทั้งหมด</span><span style="font-family:Prompt,sans-serif;font-weight:700;color:var(--green);font-size:1.05rem">฿${fmt(grand)}</span></div>`;

  const byCat = {};
  bills.forEach(b => { byCat[b.category]=(byCat[b.category]||0)+b.total; });
  document.getElementById('categoryContent').innerHTML =
    Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<div class="summary-row"><span>${c}</span><span style="font-weight:600">฿${fmt(v)}</span></div>`).join('');
}

function exportCSV() {
  if(!bills.length) { alert('ไม่มีข้อมูล'); return; }
  let csv = '\uFEFF';
  csv += 'เลขที่บิล,วันที่,ผู้ขาย,หมวดหมู่,รายการ,จำนวน,หน่วย,ราคา/หน่วย,รวม\n';
  bills.forEach(b => b.items.forEach(item => {
    csv += `"${b.billNo}","${b.billDate}","${b.vendor}","${b.category}","${item.name}","${item.qty}","${item.unit}","${item.price}","${item.sub}"\n`;
  }));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
  a.download = `บิลวัตถุดิบ_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='history') renderHistory();
  if(tab==='summary') renderSummary();
}
function closeModal() { document.getElementById('previewModal').classList.remove('open'); }
function handleOverlayClick(e) { if(e.target===document.getElementById('previewModal')) closeModal(); }

function fmt(n) { return (n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function fmtDate(d) {
  if(!d) return '-';
  const [y,m,day] = d.split('-');
  const mo = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${parseInt(day)} ${mo[parseInt(m)-1]} ${parseInt(y)+543}`;
}
function fmtMonth(m) {
  if(!m||m==='?') return 'ไม่ระบุ';
  const [y,mo] = m.split('-');
  const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  return `${months[parseInt(mo)-1]} ${parseInt(y)+543}`;
}
</script>

</body>
</html>
